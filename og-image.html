<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #080a12;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: -30%; left: -20%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(16,185,129,0.15), transparent 70%);
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -30%; right: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(6,182,212,0.12), transparent 70%);
  }
  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px;
  }
  .logo {
    width: 90px; height: 90px;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    border-radius: 22px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
    box-shadow: 0 8px 32px rgba(16,185,129,0.3);
  }
  .logo-top { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: 1px; }
  .logo-bottom { font-size: 28px; font-weight: 900; color: white; letter-spacing: 1px; }
  h1 {
    font-size: 72px;
    font-weight: 800;
    color: #e8ecf4;
    letter-spacing: -2px;
    margin-bottom: 16px;
  }
  h1 span {
    background: linear-gradient(135deg, #34d399, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p {
    font-size: 24px;
    color: #94a3c0;
    letter-spacing: 0.3px;
    margin-bottom: 32px;
  }
  .tags {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(52,211,153,0.08);
    border: 1px solid rgba(52,211,153,0.2);
    color: #34d399;
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-top">CUSTO</div>
      <div class="logo-bottom">REAL</div>
    </div>
    <h1>Custo<span>Real</span></h1>
    <p>O custo verdadeiro da sua importacao — impostos reais por NCM</p>
    <div class="tags">
      <div class="tag">10.521 NCMs</div>
      <div class="tag">TEC/TIPI 2026</div>
      <div class="tag">Remessa Conforme</div>
      <div class="tag">ICMS por Estado</div>
      <div class="tag">100% Gratis</div>
    </div>
  </div>
</body>
</html>
